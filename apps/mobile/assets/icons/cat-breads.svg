<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Baguette diagonal con cortes -->
  <!-- Cuerpo -->
  <rect x="2" y="10" width="28" height="12" rx="6" fill="#E8B44A" transform="rotate(-20 16 16)"/>
  <!-- Gradiente más claro arriba -->
  <rect x="2" y="10" width="28" height="6" rx="6" fill="#F0CC60" transform="rotate(-20 16 16)"/>
  <!-- Cortes diagonales -->
  <line x1="11" y1="11" x2="13" y2="17" stroke="#C08020" stroke-width="1" stroke-linecap="round" opacity="0.6" transform="rotate(-20 16 16)"/>
  <line x1="16" y1="11" x2="18" y2="17" stroke="#C08020" stroke-width="1" stroke-linecap="round" opacity="0.6" transform="rotate(-20 16 16)"/>
  <line x1="21" y1="11" x2="23" y2="17" stroke="#C08020" stroke-width="1" stroke-linecap="round" opacity="0.6" transform="rotate(-20 16 16)"/>
  <!-- Brillo -->
  <ellipse cx="14" cy="13" rx="5" ry="2" fill="white" opacity="0.18" transform="rotate(-20 16 16)"/>
</svg>
