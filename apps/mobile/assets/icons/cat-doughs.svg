<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rodillo amasando sobre masa -->
  <!-- Mesa/superficie -->
  <rect x="2" y="24" width="28" height="4" rx="2" fill="#E8C87A" opacity="0.4"/>
  <!-- Masa aplastada -->
  <ellipse cx="16" cy="22" rx="11" ry="4" fill="#F0D68A"/>
  <ellipse cx="16" cy="21.5" rx="10" ry="3.5" fill="#F5E0A0"/>
  <!-- Brillo en la masa -->
  <ellipse cx="13" cy="21" rx="3" ry="1.5" fill="white" opacity="0.2"/>
  <!-- Rodillo arriba (acción de amasar) -->
  <!-- Cilindro central -->
  <rect x="7" y="12" width="18" height="6" rx="3" fill="#C09050"/>
  <rect x="7" y="12" width="18" height="3" rx="3" fill="#D4A868" opacity="0.6"/>
  <!-- Mangos -->
  <rect x="3" y="13.5" width="5" height="3" rx="1.5" fill="#A07040"/>
  <rect x="24" y="13.5" width="5" height="3" rx="1.5" fill="#A07040"/>
  <!-- Brillo del rodillo -->
  <rect x="10" y="13" width="12" height="1.5" rx="0.75" fill="white" opacity="0.15"/>
  <!-- Harina esparcida -->
  <circle cx="5" cy="23" r="0.8" fill="#F5E0A0" opacity="0.5"/>
  <circle cx="8" cy="26" r="0.6" fill="#F5E0A0" opacity="0.4"/>
  <circle cx="24" cy="24" r="0.7" fill="#F5E0A0" opacity="0.45"/>
  <circle cx="27" cy="26" r="0.5" fill="#F5E0A0" opacity="0.35"/>
  <circle cx="12" cy="27" r="0.4" fill="#F5E0A0" opacity="0.3"/>
  <circle cx="20" cy="27" r="0.5" fill="#F5E0A0" opacity="0.35"/>
</svg>
