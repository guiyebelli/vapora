<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Plato con tenedor y cuchillo a los costados -->
  <!-- Tenedor izquierda (x=2, dientes equidistantes) -->
  <rect x="2.5" y="6" width="1.5" height="18" rx="0.75" fill="#C0C0C0"/>
  <rect x="1" y="6" width="1" height="6" rx="0.5" fill="#C0C0C0"/>
  <rect x="2.5" y="6" width="1" height="6" rx="0.5" fill="#C0C0C0"/>
  <rect x="4.5" y="6" width="1" height="6" rx="0.5" fill="#C0C0C0"/>
  <rect x="2.8" y="13" width="0.5" height="9" rx="0.25" fill="white" opacity="0.25"/>
  <!-- Cuchillo derecha (misma distancia que tenedor) -->
  <rect x="27" y="6" width="1.5" height="18" rx="0.75" fill="#C0C0C0"/>
  <path d="M28.5 6c1.2 0 2 .8 2 2v3.5c0 .8-.8 1.5-2 1.5" fill="#D8D8D8"/>
  <rect x="27.3" y="8" width="0.5" height="14" rx="0.25" fill="white" opacity="0.2"/>
  <!-- Plato -->
  <ellipse cx="16" cy="20" rx="10" ry="6" fill="#E8D4FF"/>
  <ellipse cx="16" cy="19" rx="8.5" ry="5" fill="#F0E4FF"/>
  <ellipse cx="16" cy="19" rx="5.5" ry="3" fill="#E0C8F8" opacity="0.5"/>
  <!-- Brillo del plato -->
  <ellipse cx="13" cy="17.5" rx="3.5" ry="1.5" fill="white" opacity="0.2"/>
  <!-- Vapor sutil -->
  <path d="M13 12c0-1.5 1-2 .5-3.5" fill="none" stroke="#FFAD7D" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <path d="M17 11c0-1.5 1-2.5 .5-4" fill="none" stroke="#FFAD7D" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
</svg>
