<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Cupcake con chispitas -->
  <!-- Papelito/base -->
  <path d="M8 18h16l-2 10H10l-2-10z" fill="#E8C87A"/>
  <!-- Líneas del papelito -->
  <line x1="11" y1="18" x2="10.2" y2="28" stroke="#D4A84A" stroke-width="0.6" opacity="0.5"/>
  <line x1="14" y1="18" x2="13.5" y2="28" stroke="#D4A84A" stroke-width="0.6" opacity="0.5"/>
  <line x1="17" y1="18" x2="17" y2="28" stroke="#D4A84A" stroke-width="0.6" opacity="0.5"/>
  <line x1="20" y1="18" x2="18.5" y2="28" stroke="#D4A84A" stroke-width="0.6" opacity="0.5"/>
  <!-- Crema/frosting -->
  <path d="M7 18c0-6 4-10 9-10s9 4 9 10H7z" fill="#FFB0B0"/>
  <!-- Forma ondulada de la crema -->
  <path d="M7 18c1-2 3-3 5-2s4 1 5-1 3-3 5-2 3 2 3 5" fill="#FFC8C8" opacity="0.5"/>
  <!-- Punta de la crema -->
  <ellipse cx="16" cy="9" rx="3" ry="2" fill="#FFC8C8"/>
  <!-- Chispitas de colores -->
  <rect x="10" y="12" width="2" height="1" rx="0.5" fill="#E85D2C" transform="rotate(-30 11 12.5)"/>
  <rect x="14" y="10" width="2" height="1" rx="0.5" fill="#22A860" transform="rotate(20 15 10.5)"/>
  <rect x="19" y="12" width="2" height="1" rx="0.5" fill="#3B82F6" transform="rotate(-15 20 12.5)"/>
  <rect x="12" y="15" width="2" height="1" rx="0.5" fill="#F59E0B" transform="rotate(35 13 15.5)"/>
  <rect x="17" y="14" width="2" height="1" rx="0.5" fill="#E85D2C" transform="rotate(-25 18 14.5)"/>
  <rect x="21" y="16" width="1.5" height="0.8" rx="0.4" fill="#22A860" transform="rotate(10 21.75 16.4)"/>
  <rect x="9" y="16" width="1.5" height="0.8" rx="0.4" fill="#3B82F6" transform="rotate(-20 9.75 16.4)"/>
  <rect x="15" y="17" width="1.5" height="0.8" rx="0.4" fill="#F59E0B" transform="rotate(40 15.75 17.4)"/>
  <!-- Brillo en la crema -->
  <ellipse cx="13" cy="13" rx="2.5" ry="2" fill="white" opacity="0.2"/>
</svg>
