<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Welcome: olla de Vapora con comida alrededor -->

  <!-- Olla central (nuestra marca) -->
  <rect x="82" y="95" width="76" height="52" rx="10" fill="#E85D2C"/>
  <rect x="74" y="88" width="92" height="12" rx="6" fill="#C44A1F"/>
  <!-- Asas -->
  <rect x="60" y="110" width="16" height="8" rx="4" fill="#C44A1F" opacity="0.7"/>
  <rect x="164" y="110" width="16" height="8" rx="4" fill="#C44A1F" opacity="0.7"/>
  <!-- Brillo -->
  <ellipse cx="105" cy="118" rx="14" ry="10" fill="white" opacity="0.1"/>

  <!-- Vapor generoso (la olla está cocinando!) -->
  <path d="M100 80c0-5 3-7 2-12" stroke="#FFAD7D" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M115 75c0-5 3-8 2-14" stroke="#FF8C5A" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
  <path d="M130 78c0-5 3-7 2-12" stroke="#FFAD7D" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <path d="M145 82c0-4 2-6 1.5-10" stroke="#FFC9A8" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Comida flotando alrededor (iconos simplificados) -->
  <!-- Cupcake mini (izq arriba) -->
  <path d="M50 70c0-4 3-7 6-7s6 3 6 7H50z" fill="#FFB0B0"/>
  <rect x="50" y="70" width="12" height="8" rx="1" fill="#E8C87A"/>
  <circle cx="56" cy="65" r="1.5" fill="#E85D2C" opacity="0.6"/>
  <circle cx="53" cy="66" r="1" fill="#22A860" opacity="0.5"/>

  <!-- Baguette mini (der arriba) -->
  <rect x="170" y="58" width="30" height="10" rx="5" fill="#E8B44A" transform="rotate(-25 185 63)"/>
  <line x1="178" y1="59" x2="180" y2="66" stroke="#C08020" stroke-width="0.8" opacity="0.5" transform="rotate(-25 185 63)"/>
  <line x1="184" y1="59" x2="186" y2="66" stroke="#C08020" stroke-width="0.8" opacity="0.5" transform="rotate(-25 185 63)"/>

  <!-- Taza mini (izq abajo) -->
  <rect x="42" y="135" width="20" height="16" rx="3" fill="#88B8D8"/>
  <path d="M62 140c3 0 4 2 4 4s-1 4-4 4" fill="none" stroke="#6A9AB8" stroke-width="2" stroke-linecap="round"/>
  <path d="M48 132c0-2 1-3 .5-4" stroke="#FFAD7D" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>

  <!-- Bowl mini (der abajo) -->
  <path d="M170 145h28c0 0 0 1-1 4l-1 4c-.3 1-1 2-2 2h-20c-1 0-1.7-1-2-2l-1-4c-1-3-1-4-1-4z" fill="#88D888"/>
  <ellipse cx="184" cy="145" rx="14" ry="3" fill="#70C870"/>

  <!-- Corazoncitos -->
  <path d="M88 55 C88 52 92 52 92 55 C92 58 88 61 88 61 C88 61 84 58 84 55 C84 52 88 52 88 55Z" fill="#E85D2C" opacity="0.4"/>
  <path d="M155 48 C155 46 157.5 46 157.5 48 C157.5 50 155 52 155 52 C155 52 152.5 50 152.5 48 C152.5 46 155 46 155 48Z" fill="#22A860" opacity="0.4"/>

  <!-- Base -->
  <rect x="55" y="150" width="130" height="4" rx="2" fill="#F5F5F4" opacity="0.5"/>

  <!-- Partículas -->
  <circle cx="38" cy="100" r="3" fill="#FFE0CC" opacity="0.4"/>
  <circle cx="202" cy="95" r="2.5" fill="#FFE0CC" opacity="0.35"/>
  <circle cx="45" cy="160" r="2" fill="#FFAD7D" opacity="0.3"/>
  <circle cx="195" cy="155" r="2.5" fill="#FFE0CC" opacity="0.3"/>
