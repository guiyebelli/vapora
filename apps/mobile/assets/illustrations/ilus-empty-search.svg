<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Thermomix pot (empty) -->
  <rect x="88" y="105" width="64" height="50" rx="7" fill="#E7E5E4"/>
  <rect x="92" y="100" width="56" height="10" rx="5" fill="#D6D3D1"/>
  <!-- Inside pot: ellipsis (empty/nothing) -->
  <circle cx="108" cy="128" r="3" fill="#A8A29E" opacity="0.5"/>
  <circle cx="120" cy="128" r="3" fill="#A8A29E" opacity="0.5"/>
  <circle cx="132" cy="128" r="3" fill="#A8A29E" opacity="0.5"/>

  <!-- Magnifying glass (tilted, looking into pot) -->
  <circle cx="100" cy="72" r="22" stroke="#A8A29E" stroke-width="4" fill="none"/>
  <circle cx="100" cy="72" r="22" fill="#F5F5F4" opacity="0.3"/>
  <line x1="116" y1="88" x2="132" y2="104" stroke="#A8A29E" stroke-width="5" stroke-linecap="round"/>
  <!-- Glass reflection -->
  <path d="M90 62 Q93 58 96 62" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Faint vapor (dissipating) -->
  <path d="M108 92 Q111 82 114 92" stroke="#E7E5E4" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M120 88 Q123 78 126 88" stroke="#E7E5E4" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.3"/>

  <!-- Base line -->
  <rect x="75" y="158" width="90" height="3" rx="1.5" fill="#F5F5F4"/>

  <!-- Decorative -->
  <circle cx="60" cy="110" r="3" fill="#E7E5E4" opacity="0.4"/>
  <circle cx="185" cy="95" r="2.5" fill="#E7E5E4" opacity="0.3"/>
</svg>
