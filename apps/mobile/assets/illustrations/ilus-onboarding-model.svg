<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Thermomix model selection: TM5 y TM6 con colores cálidos -->

  <!-- TM5 (izquierda) -->
  <rect x="42" y="100" width="56" height="46" rx="8" fill="#E8C87A"/>
  <rect x="36" y="93" width="68" height="12" rx="6" fill="#D4A84A"/>
  <!-- Asa TM5 -->
  <rect x="98" y="112" width="14" height="7" rx="3.5" fill="#D4A84A" opacity="0.7"/>
  <!-- Label TM5 -->
  <rect x="53" y="113" width="34" height="16" rx="4" fill="#D4A84A" opacity="0.3"/>
  <text x="70" y="125" font-family="sans-serif" font-size="11" font-weight="700" fill="#8B6914" text-anchor="middle">TM5</text>
  <!-- Vapor TM5 -->
  <path d="M58 85c0-4 2.5-5.5 2-9" stroke="#FFAD7D" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <path d="M72 82c0-4 2.5-6 2-10" stroke="#FFAD7D" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  <!-- Brillo TM5 -->
  <ellipse cx="60" cy="120" rx="8" ry="6" fill="white" opacity="0.1"/>

  <!-- TM6 (derecha, un poco más grande) -->
  <rect x="140" y="94" width="62" height="50" rx="9" fill="#E85D2C"/>
  <rect x="133" y="86" width="76" height="14" rx="7" fill="#C44A1F"/>
  <!-- Asa TM6 -->
  <rect x="202" y="108" width="15" height="8" rx="4" fill="#C44A1F" opacity="0.7"/>
  <!-- Label TM6 -->
  <rect x="152" y="108" width="38" height="18" rx="4" fill="#C44A1F" opacity="0.3"/>
  <text x="171" y="121" font-family="sans-serif" font-size="12" font-weight="700" fill="#FFF5EE" text-anchor="middle">TM6</text>
  <!-- Vapor TM6 -->
  <path d="M158 78c0-4 2.5-5.5 2-9" stroke="#FFAD7D" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <path d="M172 74c0-5 3-7 2-11" stroke="#FF8C5A" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <path d="M186 78c0-4 2.5-5.5 2-9" stroke="#FFAD7D" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <!-- Brillo TM6 -->
  <ellipse cx="158" cy="118" rx="10" ry="7" fill="white" opacity="0.1"/>

  <!-- Check naranja entre ambos -->
  <circle cx="120" cy="70" r="16" fill="#E85D2C"/>
  <polyline points="112,70 118,76 128,64" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Base -->
  <rect x="30" y="148" width="180" height="4" rx="2" fill="#F5F5F4" opacity="0.4"/>

  <!-- Partículas -->
  <circle cx="30" cy="115" r="3" fill="#FFE0CC" opacity="0.4"/>
  <circle cx="225" cy="100" r="2.5" fill="#FFE0CC" opacity="0.35"/>
  <circle cx="120" cy="165" r="2.5" fill="#FFAD7D" opacity="0.3"/>
</svg>
