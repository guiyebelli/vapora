<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Empty category: olla abierta vacía -->
  <!-- Tapa volteada al costado -->
  <ellipse cx="170" cy="100" rx="30" ry="8" fill="#D6D3D1" transform="rotate(-30 170 100)"/>
  <ellipse cx="170" cy="98" rx="28" ry="6" fill="#E7E5E4" transform="rotate(-30 170 100)"/>
  <!-- Mango de la tapa -->
  <circle cx="170" cy="88" r="5" fill="#C0C0C0" transform="rotate(-30 170 100)"/>

  <!-- Olla vacía -->
  <path d="M70 120h100v35c0 12-10 20-25 20H95c-15 0-25-8-25-20v-35z" fill="#E8C87A"/>
  <!-- Borde de la olla -->
  <rect x="64" y="114" width="112" height="10" rx="5" fill="#D4A84A"/>
  <!-- Asas -->
  <rect x="50" y="130" width="16" height="8" rx="4" fill="#D4A84A" opacity="0.7"/>
  <rect x="174" y="130" width="16" height="8" rx="4" fill="#D4A84A" opacity="0.7"/>
  <!-- Interior oscuro (vacío) -->
  <ellipse cx="120" cy="120" rx="45" ry="8" fill="#C09040" opacity="0.3"/>
  <!-- Brillo -->
  <ellipse cx="100" cy="140" rx="15" ry="10" fill="white" opacity="0.1"/>

  <!-- Líneas punteadas (nada adentro) -->
  <line x1="100" y1="135" x2="100" y2="155" stroke="#D4A84A" stroke-width="2" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="120" y1="135" x2="120" y2="155" stroke="#D4A84A" stroke-width="2" stroke-dasharray="4 4" opacity="0.25"/>
  <line x1="140" y1="135" x2="140" y2="155" stroke="#D4A84A" stroke-width="2" stroke-dasharray="4 4" opacity="0.2"/>

  <!-- Partículas decorativas -->
  <circle cx="50" cy="95" r="3.5" fill="#FFE0CC" opacity="0.4"/>
  <circle cx="195" cy="160" r="3" fill="#E8C87A" opacity="0.35"/>
  <circle cx="45" cy="160" r="2.5" fill="#FFAD7D" opacity="0.3"/>
</svg>
